name: cashlog-ml-ci

on:
  pull_request:
  push:
    branches: [main, "250716"]

permissions:
  contents: read
  packages: write

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate Python sources and 33-leaf contract
        run: |
          python -m compileall -q src scripts dags
          python - <<'PY'
          import json
          from pathlib import Path
          categories = json.loads(Path("configs/cashlog/categories.json").read_text())
          semantics = json.loads(Path("configs/cashlog/leaf_semantics.json").read_text())
          lexicon = json.loads(Path("configs/cashlog/ocr_lexicon.json").read_text())
          ids = [row["id"] for row in categories]
          assert len(ids) == len(set(ids)) == 33
          assert set(ids) == set(semantics["leaves"]) == set(lexicon["leaves"])
          PY
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build or publish API runtime without model weights
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
