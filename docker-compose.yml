services:
  trainer:
    build:
      context: .
    image: catai-trainer:local
    working_dir: /workspace
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: catai-cashlog-category
      CATAI_OUTPUT_DIR: checkpoints/cashlog_leaf_docker
    volumes:
      - .:/workspace
    depends_on:
      - mlflow
    command:
      - python
      - scripts/train_cashlog_category_from_uecfood.py
      - --output-dir
      - checkpoints/cashlog_leaf_docker
      - --epochs
      - "30"
      - --batch-size
      - "32"
      - --log-interval
      - "50"
      - --mlflow-tracking-uri
      - http://mlflow:5000
    profiles:
      - train

  mlflow:
    image: catai-trainer:local
    build:
      context: .
    working_dir: /workspace
    ports:
      - "127.0.0.1:5500:5000"
    volumes:
      - .:/workspace
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////workspace/mlruns/mlflow.db
      - --default-artifact-root
      - mlflow-artifacts:/
      - --serve-artifacts
      - --artifacts-destination
      - /workspace/mlruns/artifacts
      - --allowed-hosts
      - 127.0.0.1,127.0.0.1:5500,localhost,localhost:5500,mlflow,mlflow:5000,catai-mlflow-1,catai-mlflow-1:5000
      - --cors-allowed-origins
      - http://127.0.0.1:5500,http://localhost:5500,http://mlflow:5000

  airflow:
    image: catai-trainer:local
    build:
      context: .
    working_dir: /workspace
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /workspace/dags
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////workspace/airflow_home/airflow.db
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: catai-cashlog-category
      CATAI_TRAIN_EPOCHS: "30"
      CATAI_TRAIN_BATCH_SIZE: "32"
      CATAI_OUTPUT_DIR: checkpoints/cashlog_leaf_airflow
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - .:/workspace
    depends_on:
      - mlflow
    command:
      - bash
      - -lc
      - |
        set -e
        mkdir -p /workspace/airflow_home
        airflow db migrate || airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Catai \
          --lastname Admin \
          --role Admin \
          --email admin@example.com || true
        airflow scheduler &
        exec airflow webserver --host 0.0.0.0 --port 8080

  cashlog-api:
    image: catai-trainer:local
    build:
      context: .
    working_dir: /workspace
    environment:
      CATAI_CASHLOG_HYBRID_CONFIG: configs/cashlog/hybrid.serving.json
      CATAI_CORS_ALLOWED_ORIGINS: ${CATAI_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
    ports:
      - "127.0.0.1:8010:8010"
    volumes:
      - .:/workspace
    command:
      - python
      - -m
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8010"

  jenkins:
    image: catai-jenkins:local
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    ports:
      - "127.0.0.1:8081:8080"
      - "127.0.0.1:50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./reports:/catai-reports:ro
    depends_on:
      - airflow

volumes:
  jenkins_home:
