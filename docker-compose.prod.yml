services:
  cashlog-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: catai-cashlog-api:prod
    environment:
      CATAI_CASHLOG_HYBRID_CONFIG: /app/configs/cashlog/hybrid.serving.json
      CATAI_CORS_ALLOWED_ORIGINS: ${CATAI_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      CATAI_REQUIRE_INTERNAL_API_KEY: ${CATAI_REQUIRE_INTERNAL_API_KEY:-true}
      CATAI_INTERNAL_API_KEY: ${CATAI_INTERNAL_API_KEY:-}
    ports:
      - "${CASHLOG_API_HOST:-127.0.0.1}:${CASHLOG_API_PORT:-8010}:8010"
    volumes:
      - ./models:/app/models:ro
      - ./checkpoints:/app/checkpoints:ro
      - ./reports/cashlog33/model_report:/app/reports/cashlog33/model_report:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    init: true
    restart: unless-stopped
